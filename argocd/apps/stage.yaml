apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-world-stage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/OhWreckedcom10/Final-Project.git
    targetRevision: main
    path: helm/hello-world
    helm:
      valueFiles:
        - ../../environments/stage/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: stage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true