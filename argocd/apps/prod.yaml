apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: final-project-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/OhWreckedcom10/Final-Project.git
    targetRevision: main
    path: helm/hello-world
    helm:
      valueFiles:
        - ../../environments/prod/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  ignoreDifferences:
    - group: argoproj.io
      kind: Rollout
      jsonPointers:
        - /spec/replicas

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true