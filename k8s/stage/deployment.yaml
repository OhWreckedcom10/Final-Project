apiVersion: apps/v1
kind: Deployment
metadata:
  name: final-project
  labels:
    app: final-project
    environment: stage
spec:
  replicas: 2

  selector:
    matchLabels:
      app: final-project
      environment: stage

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  template:
    metadata:
      labels:
        app: final-project
        environment: stage

    spec:
      containers:
        - name: final-project
          image: IMAGE_URI_PLACEHOLDER
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 5000
              protocol: TCP

          env:
            - name: APP_ENV
              value: stage

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi